<h2>MonkSynth</h2>
<p>This installer will install the MonkSynth vocal synthesizer plugin on your computer.</p>
<p>You can choose to install the <strong>VST3</strong> plugin, the <strong>Audio Unit</strong> plugin, or both.</p>
<p>After installation, restart your DAW and scan for new plugins.</p>
